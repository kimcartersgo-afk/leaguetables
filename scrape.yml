name: Scrape FAW Comet League Table

on:
  schedule:
    - cron: '*/15 * * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  scrape:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install -r scraper/requirements.txt

      - name: Run scraper
        env:
          COMET_SESSION: ${{ secrets.COMET_SESSION }}
        run: python scraper/scrape.py

      - name: Commit updated data
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/league-table.json data/u15-black.json data/youth.json data/first-team.json data/reserves.json
          git diff --staged --quiet || git commit -m "chore: update league table $(date -u '+%Y-%m-%d %H:%M UTC')"
          git push
